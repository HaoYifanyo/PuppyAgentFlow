version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: puppy-backend
    env_file:
      - ./.env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: puppy-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
